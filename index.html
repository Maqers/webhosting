<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Preconnect for critical third-party resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- DNS Prefetch for other external domains -->
  <link rel="dns-prefetch" href="https://www.google-analytics.com">
  <link rel="dns-prefetch" href="https://images.unsplash.com">

  <!-- Preload LCP image: first featured product on homepage (Handcrafted Floral Basket) -->
  <!-- Uses medium webp (22KB) which is what FeaturedCard renders for index 0 -->
  <link rel="preload" as="image" href="/images/med-remove-the-background-make-it-transparent.webp" type="image/webp" fetchpriority="high">

  <!-- Prefetch for likely next page resources -->
  <link rel="prefetch" href="/products" as="document">

  <!-- Font Loading Optimization -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet">
  </noscript>

  <title>Maqers.in</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Performance and SEO Meta Tags -->
  <meta name="description" content="Discover unique, handcrafted gifts from India - Premium custom gifts collection">
  <meta name="theme-color" content="#760909">

  <style>
    /* Critical CSS to prevent FOUC */
    body {
      margin: 0;
      padding: 0;
      font-family: 'EB Garamond', 'Garamond', 'Times New Roman', serif;
      background: #F8F8F8;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      /* iOS Safari fix */
      min-height: 100dvh;
      /* Dynamic viewport height */
    }

    /* CLS prevention: reserve space for sections before React renders */
    .hero-bright { min-height: 320px; }
    .category-circles-strip { min-height: 130px; }
    .featured-section { min-height: 500px; }

    /* CLS prevention: fix image container dimensions before external CSS loads */
    .category-circle-img {
      width: 82px;
      height: 82px;
      min-width: 82px;
      min-height: 82px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .feat-img-zone {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }
    @media (max-width: 968px) {
      .feat-img-zone { aspect-ratio: 4 / 5; }
    }
    @media (max-width: 480px) {
      .feat-img-zone { aspect-ratio: 3 / 4; }
      .category-circle-img { width: 70px; height: 70px; min-width: 70px; min-height: 70px; }
    }

    /* Loading overlay */
    .page-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top-color: #760909;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Deferred analytics: load after page is interactive to avoid blocking LCP/FID -->
  <script>
    function loadAnalytics() {
      // Google tag (gtag.js)
      var gtagScript = document.createElement('script');
      gtagScript.async = true;
      gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-1KL5DY2692';
      document.head.appendChild(gtagScript);

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-1KL5DY2692');

      // Google Tag Manager
      (function (w, d, s, l, i) {
        w[l] = w[l] || []; w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : '';
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, 'script', 'dataLayer', 'GTM-N885WBGL');
    }

    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadAnalytics, { timeout: 4000 });
    } else {
      window.addEventListener('load', function () {
        setTimeout(loadAnalytics, 1000);
      });
    }
  </script>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N885WBGL"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
</body>

</html>
